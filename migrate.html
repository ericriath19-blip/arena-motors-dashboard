<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Migração única - Arena Motors</title>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<style>
  body{ background:#0a0a0a; color:#f5f5f0; font-family:monospace; padding:24px; max-width:800px; margin:0 auto; }
  h1{ font-size:18px; margin-bottom:16px; }
  button{ background:#ffd100; color:#0a0a0a; border:none; padding:12px 20px; border-radius:8px; font-weight:bold; cursor:pointer; font-size:14px; }
  button:disabled{ opacity:0.5; cursor:not-allowed; }
  #log{ margin-top:20px; background:#141414; border:1px solid #2c2c2c; border-radius:8px; padding:16px; white-space:pre-wrap; font-size:13px; line-height:1.6; max-height:500px; overflow:auto; }
  .ok{ color:#3ddc97; }
  .err{ color:#ff6b4a; }
  .warn{ color:#ffe066; }
</style>
</head>
<body>
<h1>🔄 Migração única: dados fixos → Firestore</h1>
<p style="color:#9a9a92; font-size:13px; margin-bottom:16px;">Usa dados colados manualmente (sem depender do Apps Script). Uso único, depois pode fechar.</p>
<button id="btnMigrate">Iniciar migração</button>
<div id="log"></div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyADj6CWOUh66_G7qMoFmLxzorSRmwzhG3Q",
  authDomain: "arena-motors-dashboard.firebaseapp.com",
  projectId: "arena-motors-dashboard",
  storageBucket: "arena-motors-dashboard.firebasestorage.app",
  messagingSenderId: "668179364218",
  appId: "1:668179364218:web:7fc08915222efb30c13ec3"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// Dado colado manualmente pelo usuário (config atual, com "Icarros" incluso)
const OLD_CONFIG = [
  {"id":"site-proprio","name":"Site Próprio","fee":30000,"promised":1200},
  {"id":"webmotors","name":"Webmotors","fee":32000,"promised":1280},
  {"id":"olx","name":"OLX","fee":12280,"promised":680},
  {"id":"napista","name":"Na Pista","fee":3000,"promised":200},
  {"id":"usadosbr","name":"UsadosBR","fee":20000,"promised":1600},
  {"id":"mobiauto","name":"Mobiauto","fee":8000,"promised":400},
  {"id":"icarros","name":"Icarros","fee":8000,"promised":600}
];

// Dado capturado do print da planilha antes da migração
const OLD_ENTRIES = [
  {"id":"fhw5q2ihmr53lq19","shoppingId":"arena-sul","portalId":"webmotors","date":"2026-04-01","portalLeads":68,"crmLeads":60},
  {"id":"04jmbt0ymr53mqgr","shoppingId":"arena-sul","portalId":"olx","date":"2026-04-01","portalLeads":390,"crmLeads":151},
  {"id":"438zef1hmr53ng0d","shoppingId":"arena-sul","portalId":"mobiauto","date":"2026-04-01","portalLeads":98,"crmLeads":98},
  {"id":"sbiqekifmr53oxft","shoppingId":"arena-sul","portalId":"4egceuwpmr53ogp2","date":"2026-04-01","portalLeads":69,"crmLeads":33},
  {"id":"vub18di4mr53ps4a","shoppingId":"arena-leste","portalId":"webmotors","date":"2026-04-03","portalLeads":363,"crmLeads":373},
  {"id":"d1hbi2izmr53qevf","shoppingId":"arena-leste","portalId":"olx","date":"2026-04-03","portalLeads":441,"crmLeads":180},
  {"id":"426k7alemr53r4b8","shoppingId":"arena-leste","portalId":"mobiauto","date":"2026-04-03","portalLeads":151,"crmLeads":156},
  {"id":"jgv6j3wpmr53rslz","shoppingId":"arena-leste","portalId":"4egceuwpmr53ogp2","date":"2026-04-03","portalLeads":111,"crmLeads":98},
  {"id":"1ckyayeqmr53sgvb","shoppingId":"arena-sto-andre","portalId":"webmotors","date":"2026-04-03","portalLeads":421,"crmLeads":402},
  {"id":"y0dq0yhhmr53tatm","shoppingId":"arena-leste","portalId":"usadosbr","date":"2026-04-03","portalLeads":162,"crmLeads":136},
  {"id":"p3z3lzltmr53uxgi","shoppingId":"arena-sul","portalId":"usadosbr","date":"2026-04-03","portalLeads":106,"crmLeads":100},
  {"id":"wsssskqt2mr53wlk0","shoppingId":"arena-sto-andre","portalId":"usadosbr","date":"2026-04-03","portalLeads":174,"crmLeads":164},
  {"id":"dks3bh9omr53xbp9","shoppingId":"arena-sto-andre","portalId":"olx","date":"2026-04-03","portalLeads":430,"crmLeads":240},
  {"id":"60y9vxmkmr53xzdb","shoppingId":"arena-sto-andre","portalId":"mobiauto","date":"2026-04-03","portalLeads":184,"crmLeads":180},
  {"id":"9xmsnyohmr53yoyn","shoppingId":"arena-sto-andre","portalId":"4egceuwpmr53ogp2","date":"2026-04-03","portalLeads":229,"crmLeads":189}
];

const logEl = document.getElementById('log');
function log(msg, cls=''){
  const line = document.createElement('div');
  if(cls) line.className = cls;
  line.textContent = msg;
  logEl.appendChild(line);
  logEl.scrollTop = logEl.scrollHeight;
}

document.getElementById('btnMigrate').addEventListener('click', async ()=>{
  document.getElementById('btnMigrate').disabled = true;
  logEl.innerHTML = '';
  try{
    log('Autenticando no Firebase...');
    await new Promise((resolve, reject)=>{
      const t = setTimeout(()=>reject(new Error('timeout na autenticação')), 15000);
      firebase.auth().onAuthStateChanged(u=>{ if(u){ clearTimeout(t); resolve(); } });
      firebase.auth().signInAnonymously().catch(reject);
    });
    log('Autenticado.', 'ok');

    log(`Gravando ${OLD_CONFIG.length} portais no Firestore...`);
    const batch1 = db.batch();
    OLD_CONFIG.forEach(p=>{
      const clean = { id: String(p.id), name: String(p.name), fee: Number(p.fee||0), promised: Number(p.promised||0) };
      batch1.set(db.collection('config').doc(clean.id), clean);
    });
    await batch1.commit();
    log(`${OLD_CONFIG.length} portais gravados.`, 'ok');

    log(`Gravando ${OLD_ENTRIES.length} lançamentos no Firestore...`);
    const batch2 = db.batch();
    let fixedCount = 0;
    OLD_ENTRIES.forEach(e=>{
      let portalId = String(e.portalId);
      if(portalId === '4egceuwpmr53ogp2'){
        portalId = 'napista';
        fixedCount++;
      }
      const clean = {
        id: String(e.id), shoppingId: String(e.shoppingId), portalId,
        date: String(e.date), portalLeads: Number(e.portalLeads||0), crmLeads: Number(e.crmLeads||0)
      };
      batch2.set(db.collection('entries').doc(clean.id), clean);
    });
    await batch2.commit();
    log(`${OLD_ENTRIES.length} lançamentos gravados.`, 'ok');
    if(fixedCount > 0){
      log(`${fixedCount} lançamento(s) corrigido(s) de ID quebrado para "napista".`, 'warn');
    }

    log('');
    log('✅ MIGRAÇÃO CONCLUÍDA. Pode fechar essa página e voltar pro painel.', 'ok');
  }catch(err){
    log('ERRO: ' + err.message, 'err');
    document.getElementById('btnMigrate').disabled = false;
  }
});
</script>
</body>
</html>
