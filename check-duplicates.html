<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Diagnóstico - Duplicados</title>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<style>
  body{ background:#0a0a0a; color:#f5f5f0; font-family:monospace; padding:24px; max-width:900px; margin:0 auto; }
  h1{ font-size:18px; margin-bottom:16px; }
  h2{ font-size:14px; margin:20px 0 8px; color:#ffd100; }
  button{ background:#ffd100; color:#0a0a0a; border:none; padding:12px 20px; border-radius:8px; font-weight:bold; cursor:pointer; font-size:14px; }
  button:disabled{ opacity:0.5; cursor:not-allowed; }
  #log{ margin-top:20px; background:#141414; border:1px solid #2c2c2c; border-radius:8px; padding:16px; white-space:pre-wrap; font-size:13px; line-height:1.6; max-height:600px; overflow:auto; }
  .ok{ color:#3ddc97; }
  .err{ color:#ff6b4a; }
  .warn{ color:#ffe066; }
  .grp{ border-left:2px solid #ffe066; padding-left:10px; margin:8px 0; }
</style>
</head>
<body>
<h1>🔍 Diagnóstico: dados duplicados</h1>
<p style="color:#9a9a92; font-size:13px; margin-bottom:16px;">Só lê e mostra, não apaga nada. Você decide o que remover, se precisar.</p>
<button id="btnDiag">Diagnosticar</button>
<div id="log"></div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyADj6CWOUh66_G7qMoFmLxzorSRmwzhG3Q",
  authDomain: "arena-motors-dashboard.firebaseapp.com",
  projectId: "arena-motors-dashboard",
  storageBucket: "arena-motors-dashboard.firebasestorage.app",
  messagingSenderId: "668179364218",
  appId: "1:668179364218:web:7fc08915222efb30c13ec3"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const logEl = document.getElementById('log');
function log(msg, cls=''){
  const line = document.createElement('div');
  if(cls) line.className = cls;
  line.innerHTML = msg;
  logEl.appendChild(line);
  logEl.scrollTop = logEl.scrollHeight;
}

async function ensureAuth(){
  await new Promise((resolve, reject)=>{
    const t = setTimeout(()=>reject(new Error('timeout na autenticação')), 15000);
    firebase.auth().onAuthStateChanged(u=>{ if(u){ clearTimeout(t); resolve(); } });
    firebase.auth().signInAnonymously().catch(reject);
  });
}

document.getElementById('btnDiag').addEventListener('click', async ()=>{
  logEl.innerHTML = '';
  document.getElementById('btnDiag').disabled = true;
  try{
    log('Autenticando...');
    await ensureAuth();
    log('Autenticado.', 'ok');

    // ---- CONFIG: nomes duplicados ----
    log('');
    log('=== CONFIG (portais) ===');
    const configSnap = await db.collection('config').get();
    log(`Total de portais: ${configSnap.docs.length}`);
    const byName = {};
    configSnap.docs.forEach(d=>{
      const name = (d.data().name||'').trim().toLowerCase();
      if(!byName[name]) byName[name] = [];
      byName[name].push({ id: d.id, ...d.data() });
    });
    let configDupCount = 0;
    Object.entries(byName).forEach(([name, docs])=>{
      if(docs.length > 1){
        configDupCount++;
        log('');
        log(`⚠ Nome duplicado: "${docs[0].name}" (${docs.length}x)`, 'warn');
        docs.forEach(d=> log(`   id="${d.id}"  fee=${d.fee}  promised=${d.promised}`));
      }
    });
    if(configDupCount===0) log('Nenhum portal duplicado por nome.', 'ok');

    // ---- ENTRIES: mesmo shopping+portal+data repetido ----
    log('');
    log('=== ENTRIES (lançamentos) ===');
    const entriesSnap = await db.collection('entries').get();
    log(`Total de lançamentos: ${entriesSnap.docs.length}`);
    const byKey = {};
    entriesSnap.docs.forEach(d=>{
      const e = d.data();
      const key = `${e.shoppingId}|${e.portalId}|${e.date}`;
      if(!byKey[key]) byKey[key] = [];
      byKey[key].push({ id: d.id, ...e });
    });
    let entryDupCount = 0;
    Object.entries(byKey).forEach(([key, docs])=>{
      if(docs.length > 1){
        entryDupCount++;
        const [shoppingId, portalId, date] = key.split('|');
        log('');
        log(`⚠ Mesmo shopping+portal+data repetido: ${shoppingId} / ${portalId} / ${date} (${docs.length}x)`, 'warn');
        docs.forEach(d=> log(`   id="${d.id}"  portalLeads=${d.portalLeads}  crmLeads=${d.crmLeads}`));
      }
    });
    if(entryDupCount===0) log('Nenhum lançamento duplicado (mesmo shopping+portal+data).', 'ok');

    log('');
    log(`RESUMO: ${configDupCount} nome(s) de portal duplicado(s), ${entryDupCount} grupo(s) de lançamento duplicado(s).`, (configDupCount+entryDupCount)>0 ? 'warn' : 'ok');
  }catch(err){
    log('ERRO: ' + err.message, 'err');
  }
  document.getElementById('btnDiag').disabled = false;
});
</script>
</body>
</html>
