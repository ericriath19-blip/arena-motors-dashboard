const logEl = document.getElementById('log');
function log(msg, cls=''){
  const line = document.createElement('div');
  if(cls) line.className = cls;
  line.textContent = msg;
  logEl.appendChild(line);
  logEl.scrollTop = logEl.scrollHeight;
}

async function commitInChunks(db, docs, colName){
  // Firestore batch limita 500 operações; aqui vai em blocos de 400 por segurança
  const chunkSize = 400;
  for(let i=0; i<docs.length; i+=chunkSize){
    const batch = db.batch();
    docs.slice(i, i+chunkSize).forEach(op => op(batch));
    await batch.commit();
  }
}

document.getElementById('btnMigrate').addEventListener('click', async ()=>{
  document.getElementById('btnMigrate').disabled = true;
  logEl.innerHTML = '';
  try{
    log('Autenticando no Firebase...');
    await new Promise((resolve, reject)=>{
      const t = setTimeout(()=>reject(new Error('timeout na autenticação')), 15000);
      firebase.auth().onAuthStateChanged(u=>{ if(u){ clearTimeout(t); resolve(); } });
      firebase.auth().signInAnonymously().catch(reject);
    });
    log('Autenticado.', 'ok');

    log('Buscando lançamentos atuais no Firestore pra apagar...');
    const existing = await db.collection('entries').get();
    log(`Encontrados ${existing.docs.length} lançamentos existentes.`);

    if(existing.docs.length > 0){
      log('Apagando lançamentos existentes (evita duplicação)...');
      await commitInChunks(db, existing.docs.map(d => (batch)=> batch.delete(d.ref)), 'entries');
      log(`${existing.docs.length} lançamentos antigos apagados.`, 'ok');
    }

    log(`Gravando ${NEW_ENTRIES.length} lançamentos da planilha...`);
    await commitInChunks(db, NEW_ENTRIES.map(e => (batch)=>{
      const clean = {
        id: String(e.id), shoppingId: String(e.shoppingId), portalId: String(e.portalId),
        date: String(e.date), portalLeads: Number(e.portalLeads||0), crmLeads: Number(e.crmLeads||0)
      };
      batch.set(db.collection('entries').doc(clean.id), clean);
    }), 'entries');
    log(`${NEW_ENTRIES.length} lançamentos gravados.`, 'ok');

    log('');
    log('✅ MIGRAÇÃO CONCLUÍDA. Pode fechar essa página e voltar pro painel.', 'ok');
  }catch(err){
    log('ERRO: ' + err.message, 'err');
    document.getElementById('btnMigrate').disabled = false;
  }
});
