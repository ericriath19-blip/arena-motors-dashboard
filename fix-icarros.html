<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Diagnóstico/Correção - Icarros</title>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<style>
  body{ background:#0a0a0a; color:#f5f5f0; font-family:monospace; padding:24px; max-width:800px; margin:0 auto; }
  h1{ font-size:18px; margin-bottom:16px; }
  button{ background:#ffd100; color:#0a0a0a; border:none; padding:12px 20px; border-radius:8px; font-weight:bold; cursor:pointer; font-size:14px; margin-right:8px;}
  button:disabled{ opacity:0.5; cursor:not-allowed; }
  #log{ margin-top:20px; background:#141414; border:1px solid #2c2c2c; border-radius:8px; padding:16px; white-space:pre-wrap; font-size:13px; line-height:1.6; max-height:500px; overflow:auto; }
  .ok{ color:#3ddc97; }
  .err{ color:#ff6b4a; }
  .warn{ color:#ffe066; }
</style>
</head>
<body>
<h1>🔍 Diagnóstico: portal "Icarros"</h1>
<button id="btnDiag">1. Diagnosticar</button>
<button id="btnFix" disabled>2. Corrigir</button>
<div id="log"></div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyADj6CWOUh66_G7qMoFmLxzorSRmwzhG3Q",
  authDomain: "arena-motors-dashboard.firebaseapp.com",
  projectId: "arena-motors-dashboard",
  storageBucket: "arena-motors-dashboard.firebasestorage.app",
  messagingSenderId: "668179364218",
  appId: "1:668179364218:web:7fc08915222efb30c13ec3"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const logEl = document.getElementById('log');
function log(msg, cls=''){
  const line = document.createElement('div');
  if(cls) line.className = cls;
  line.textContent = msg;
  logEl.appendChild(line);
  logEl.scrollTop = logEl.scrollHeight;
}

async function ensureAuth(){
  await new Promise((resolve, reject)=>{
    const t = setTimeout(()=>reject(new Error('timeout na autenticação')), 15000);
    firebase.auth().onAuthStateChanged(u=>{ if(u){ clearTimeout(t); resolve(); } });
    firebase.auth().signInAnonymously().catch(reject);
  });
}

let diagResult = null;

document.getElementById('btnDiag').addEventListener('click', async ()=>{
  logEl.innerHTML = '';
  document.getElementById('btnDiag').disabled = true;
  try{
    log('Autenticando...');
    await ensureAuth();
    log('Autenticado.', 'ok');

    log('Lendo todos os documentos de "config"...');
    const snap = await db.collection('config').get();
    log(`Total de documentos: ${snap.docs.length}`, 'ok');
    log('');
    snap.docs.forEach(d=>{
      const data = d.data();
      log(`  doc.id="${d.id}"  name="${data.name}"  fee=${data.fee}  promised=${data.promised}`);
    });
    log('');

    const icarrosDocs = snap.docs.filter(d => (d.data().name||'').toLowerCase().includes('icarros'));
    log(`Documentos com nome "Icarros": ${icarrosDocs.length}`);

    const canonicalExists = snap.docs.some(d => d.id === 'icarros');
    log(`Existe doc com id exatamente "icarros"? ${canonicalExists ? 'SIM' : 'NÃO'}`, canonicalExists ? 'ok' : 'warn');

    diagResult = { icarrosDocs, canonicalExists };

    if(icarrosDocs.length === 1 && icarrosDocs[0].id !== 'icarros'){
      log('');
      log(`DIAGNÓSTICO: doc "Icarros" existe com id errado ("${icarrosDocs[0].id}"). Corrigível.`, 'warn');
      document.getElementById('btnFix').disabled = false;
    } else if(icarrosDocs.length === 1 && icarrosDocs[0].id === 'icarros'){
      log('');
      log('DIAGNÓSTICO: o id já está correto. O problema deve ser outro — não mexer aqui.', 'err');
    } else if(icarrosDocs.length > 1){
      log('');
      log('DIAGNÓSTICO: existe mais de um doc "Icarros" (duplicado). Corrigível.', 'warn');
      document.getElementById('btnFix').disabled = false;
    } else {
      log('');
      log('DIAGNÓSTICO: nenhum doc com nome "Icarros" encontrado. Situação inesperada.', 'err');
    }
  }catch(err){
    log('ERRO: ' + err.message, 'err');
  }
  document.getElementById('btnDiag').disabled = false;
});

document.getElementById('btnFix').addEventListener('click', async ()=>{
  document.getElementById('btnFix').disabled = true;
  try{
    if(!diagResult) throw new Error('rode o diagnóstico primeiro');
    const { icarrosDocs } = diagResult;

    // Usa os dados do primeiro doc encontrado (fee/promised) como fonte da verdade
    const source = icarrosDocs[0].data();
    log('');
    log(`Criando/atualizando doc canônico id="icarros" com fee=${source.fee}, promised=${source.promised}...`);
    await db.collection('config').doc('icarros').set({
      id: 'icarros', name: 'Icarros', fee: Number(source.fee||0), promised: Number(source.promised||0)
    });
    log('Doc canônico "icarros" gravado.', 'ok');

    for(const d of icarrosDocs){
      if(d.id !== 'icarros'){
        log(`Apagando doc duplicado/errado id="${d.id}"...`);
        await db.collection('config').doc(d.id).delete();
        log(`Apagado.`, 'ok');
      }
    }

    log('');
    log('✅ CORREÇÃO CONCLUÍDA. Volta pro painel e confere.', 'ok');
  }catch(err){
    log('ERRO: ' + err.message, 'err');
    document.getElementById('btnFix').disabled = false;
  }
});
</script>
</body>
</html>
